<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Checkout — ELEVEN</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#0B0B0C; --chalk:#F7F5F0; --charcoal:#1B1B1D; --charcoal-2:#232325;
    --steel:#C7CCD1; --steel-dim:#8B9096; --blue:#2F6FED; --gold:#C9A368;
    --line: rgba(247,245,240,0.12); --wa:#25D366;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--ink); color:var(--chalk); font-family:'Inter',sans-serif; min-height:100vh;}
  .mono{font-family:'JetBrains Mono',monospace;}
  .display{font-family:'Bebas Neue',sans-serif; letter-spacing:0.01em;}

  /* NAV */
  nav{
    position:sticky; top:0; z-index:100;
    display:flex; align-items:center; justify-content:space-between;
    padding:20px 48px;
    background:rgba(11,11,12,0.95);
    backdrop-filter:blur(12px);
    border-bottom:1px solid var(--line);
  }
  .nav-logo{font-family:'Bebas Neue',sans-serif; font-size:22px; letter-spacing:0.08em; text-decoration:none; color:var(--chalk);}
  .nav-back{color:var(--steel-dim); text-decoration:none; font-size:13px; display:flex; align-items:center; gap:8px; transition:color .2s;}
  .nav-back:hover{color:var(--chalk);}

  /* STEPPER */
  .stepper{display:flex; align-items:center; gap:10px; padding:32px 48px 0;}
  .step{display:flex; align-items:center; gap:8px; font-size:12px; letter-spacing:0.05em; text-transform:uppercase; color:var(--steel-dim);}
  .step.active{color:var(--chalk);}
  .step.done{color:var(--steel-dim);}
  .step .num{width:22px; height:22px; border-radius:50%; border:1px solid var(--steel-dim); display:flex; align-items:center; justify-content:center; font-family:'JetBrains Mono',monospace; font-size:11px; flex-shrink:0;}
  .step.active .num{background:var(--chalk); color:var(--ink); border-color:var(--chalk);}
  .step.done .num{background:var(--blue); border-color:var(--blue); color:var(--chalk);}
  .step-line{width:48px; height:1px; background:var(--line);}

  /* PAGE HEAD */
  .page-head{padding:20px 48px 0;}
  .page-head h1{font-family:'Bebas Neue',sans-serif; font-size:clamp(36px,6vw,56px); line-height:1;}

  /* LAYOUT */
  .checkout-layout{
    display:grid; grid-template-columns:1fr 420px; gap:48px;
    padding:36px 48px 100px; align-items:start; max-width:1100px;
  }

  /* ORDER CARD (left) */
  .order-card{background:var(--charcoal); border:1px solid var(--line); padding:28px;}
  .order-card h2{font-family:'Bebas Neue',sans-serif; font-size:22px; margin-bottom:20px; padding-bottom:16px; border-bottom:1px solid var(--line);}

  .summary-item{display:flex; gap:14px; padding:14px 0; border-bottom:1px solid var(--line); align-items:center;}
  .summary-item:last-of-type{border-bottom:none;}
  .item-art{width:60px; height:60px; background:linear-gradient(135deg,var(--charcoal-2),#161617); border:1px solid var(--line); display:flex; align-items:center; justify-content:center; flex-shrink:0;}
  .item-art svg{width:78%;}
  .item-info{flex:1; min-width:0;}
  .item-info h5{font-size:14px; font-weight:600; margin-bottom:3px;}
  .item-info span{font-size:12px; color:var(--steel-dim);}
  .item-price{font-family:'JetBrains Mono',monospace; font-size:14px; white-space:nowrap;}

  .empty-state{text-align:center; padding:48px 24px; color:var(--steel-dim);}
  .empty-state p{margin-bottom:20px; font-size:14px;}

  /* TOTALS + ACTION (right) */
  .action-card{background:var(--charcoal); border:1px solid var(--line); padding:28px; position:sticky; top:90px;}
  .action-card h2{font-family:'Bebas Neue',sans-serif; font-size:22px; margin-bottom:20px;}

  .summary-row{display:flex; justify-content:space-between; font-size:13px; color:var(--steel-dim); padding:8px 0;}
  .summary-row.total{color:var(--chalk); font-size:17px; font-weight:600; border-top:1px solid var(--line); margin-top:8px; padding-top:16px;}
  .summary-row.total .mono{font-size:19px;}

  /* WhatsApp button */
  .btn-wa{
    display:flex; align-items:center; justify-content:center; gap:12px;
    width:100%; background:var(--wa); color:#fff; border:none;
    padding:18px; margin-top:24px;
    font-size:15px; letter-spacing:0.04em; text-transform:uppercase; font-weight:700;
    cursor:pointer; font-family:'Inter',sans-serif;
    transition:filter .25s, transform .15s;
    border-radius:2px;
  }
  .btn-wa:hover{filter:brightness(1.1);}
  .btn-wa:active{transform:scale(0.98);}
  .btn-wa svg{flex-shrink:0;}

  .wa-note{
    display:flex; align-items:flex-start; gap:10px;
    margin-top:16px; padding:14px; background:rgba(37,211,102,0.06);
    border:1px solid rgba(37,211,102,0.2); border-radius:2px;
    font-size:12px; color:var(--steel-dim); line-height:1.5;
  }
  .wa-note svg{flex-shrink:0; margin-top:1px; color:var(--wa);}

  .btn-back{
    display:block; width:100%; text-align:center; margin-top:12px;
    background:none; border:1px solid var(--line); color:var(--steel-dim);
    padding:12px; font-size:12px; letter-spacing:0.06em; text-transform:uppercase;
    font-weight:500; cursor:pointer; font-family:'Inter',sans-serif; text-decoration:none;
    transition:border-color .2s, color .2s;
  }
  .btn-back:hover{border-color:var(--steel-dim); color:var(--chalk);}

  @media(max-width:900px){
    nav{padding:16px 20px;}
    .stepper{padding:24px 20px 0;}
    .page-head{padding:16px 20px 0;}
    .checkout-layout{grid-template-columns:1fr; padding:24px 20px 60px; gap:24px;}
    .action-card{position:static;}
  }
  /* ===== Pricing hidden site-wide for now ===== */
  .item-price, .summary-row, .card-price { display:none !important; }
</style>
<script src="eleven-cart.js"></script>
<script src="eleven-real-products.js"></script>
</head>
<body>

<nav>
  <a href="index.html" class="nav-logo">ELEVEN</a>
  <a href="cart.html" class="nav-back">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
    Back to cart
  </a>
</nav>

<div class="stepper">
  <div class="step done"><span class="num">✓</span> Cart</div>
  <div class="step-line"></div>
  <div class="step active"><span class="num">2</span> Checkout</div>
  <div class="step-line"></div>
  <div class="step"><span class="num">3</span> Confirmation</div>
</div>

<div class="page-head">
  <h1 class="display">Your order</h1>
</div>

<div class="checkout-layout">

  <!-- LEFT: order items -->
  <div class="order-card">
    <h2 class="display">Order summary</h2>
    <div id="orderItems">
      <div class="empty-state">
        <p>Your cart is empty.</p>
        <a href="shop.html" style="color:var(--blue); font-size:13px; text-decoration:none; letter-spacing:0.05em; text-transform:uppercase; font-weight:600;">Go shopping →</a>
      </div>
    </div>
  </div>

  <!-- RIGHT: totals + WhatsApp -->
  <div class="action-card">
    <h2 class="display">Order summary</h2>
    <div id="orderTotals">
      <div class="summary-row"><span>Subtotal</span><span class="mono" id="subtotalVal">—</span></div>
      <div class="summary-row" id="discountRow" style="display:none;"><span id="discountLabel">Discount</span><span class="mono" id="discountVal" style="color:var(--gold);">—</span></div>
      <div class="summary-row"><span>Shipping</span><span class="mono">Free</span></div>
      <div class="summary-row total"><span>Total</span><span class="mono" id="totalVal">—</span></div>
    </div>

    <button class="btn-wa" id="waBtn" onclick="orderOnWhatsApp()">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor">
        <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 0 1-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 0 1-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 0 1 2.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0 0 12.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 0 0 5.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 0 0-3.48-8.413Z"/>
      </svg>
      Order on WhatsApp
    </button>

    <div class="wa-note">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor">
        <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 0 1-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 0 1-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 0 1 2.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0 0 12.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 0 0 5.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 0 0-3.48-8.413Z"/>
      </svg>
      Tap the button — your order details will open in WhatsApp. We'll confirm and arrange delivery from there.
    </div>

    <a href="cart.html" class="btn-back">← Edit cart</a>
  </div>

</div>

<script>
const shoeShapes = [
  '<path d="M20 130 C20 112 50 100 100 95 C150 90 200 72 240 55 C265 45 280 42 285 50 C290 60 280 80 255 95 C200 118 120 132 60 134 C40 134 20 134 20 130 Z" fill="#2a2a2c" stroke="#4a4a4d" stroke-width="1.5"/>',
  '<rect x="50" y="80" width="200" height="55" rx="22" fill="#2a2a2c" stroke="#4a4a4d" stroke-width="1.5"/><rect x="65" y="60" width="170" height="35" rx="16" fill="#1f1f21" stroke="#4a4a4d" stroke-width="1.2"/>',
  '<path d="M30 120 C30 100 70 88 130 84 C190 80 240 65 270 48" fill="none" stroke="#4a4a4d" stroke-width="3"/><ellipse cx="150" cy="128" rx="120" ry="12" fill="#2a2a2c"/>',
  '<path d="M70 110 Q150 60 230 110 L215 145 Q150 108 85 145 Z" fill="#2a2a2c" stroke="#4a4a4d" stroke-width="1.5"/>'
];
function getShape(sku){if(sku.startsWith('RN'))return 0;if(sku.startsWith('CS'))return 1;if(sku.startsWith('SL'))return 3;return 2;}

function render() {
  const cart = ELEVEN.getCart();
  const itemsEl = document.getElementById('orderItems');
  const subtotalEl = document.getElementById('subtotalVal');
  const totalEl = document.getElementById('totalVal');
  const discountRowEl = document.getElementById('discountRow');
  const discountLabelEl = document.getElementById('discountLabel');
  const discountValEl = document.getElementById('discountVal');
  const waBtn = document.getElementById('waBtn');

  if (cart.length === 0) {
    itemsEl.innerHTML = '<div class="empty-state"><p>Your cart is empty.</p><a href="shop.html" style="color:var(--blue);font-size:13px;text-decoration:none;letter-spacing:0.05em;text-transform:uppercase;font-weight:600;">Go shopping →</a></div>';
    if (subtotalEl) subtotalEl.textContent = '—';
    if (totalEl) totalEl.textContent = '—';
    if (discountRowEl) discountRowEl.style.display = 'none';
    if (waBtn) waBtn.disabled = true;
    return;
  }

  itemsEl.innerHTML = cart.map(it => `
    <div class="summary-item">
      <div class="item-art"><svg viewBox="0 0 300 180">${shoeShapes[getShape(it.sku)]}</svg></div>
      <div class="item-info">
        <h5>${it.name}</h5>
        <span>${it.size} · Qty ${it.qty}</span>
      </div>
      <span class="item-price">${ELEVEN.fmt(it.price * it.qty)}</span>
    </div>
  `).join('');

  const subtotal = ELEVEN.cartSubtotal();
  const discountPct = ELEVEN.getDiscountPct();
  const discount = subtotal * (discountPct / 100);
  const total = subtotal - discount;

  if (subtotalEl) subtotalEl.textContent = ELEVEN.fmt(subtotal);
  if (totalEl) totalEl.textContent = ELEVEN.fmt(total);

  if (discountPct > 0) {
    const code = ELEVEN.getCouponCode();
    if (discountRowEl) discountRowEl.style.display = 'flex';
    if (discountLabelEl) discountLabelEl.textContent = code ? `Discount (${code})` : 'Discount';
    if (discountValEl) discountValEl.textContent = '−' + ELEVEN.fmt(discount);
  } else {
    if (discountRowEl) discountRowEl.style.display = 'none';
  }
}

function orderOnWhatsApp() {
  const cart = ELEVEN.getCart();
  if (cart.length === 0) return;

  const orderId = 'ELV-' + Math.floor(10000 + Math.random() * 90000);
  const subtotal = ELEVEN.cartSubtotal();
  const discountPct = ELEVEN.getDiscountPct();
  const discount = subtotal * (discountPct / 100);
  const total = subtotal - discount;
  const code = ELEVEN.getCouponCode();

  const itemLines = cart
    .map(i => `  • ${i.name} (${i.size}) ×${i.qty} — ${ELEVEN.fmt(i.price * i.qty)}`)
    .join('\n');

  const msgLines = [
    '🛒 *New Order — ELEVEN Footwear*',
    '─────────────────────',
    `Order ID: ${orderId}`,
    '',
    '*Items:*',
    itemLines,
    '',
    `Subtotal: ${ELEVEN.fmt(subtotal)}`
  ];
  if (discountPct > 0) {
    msgLines.push(`Discount${code ? ' (' + code + ')' : ''}: −${ELEVEN.fmt(discount)}`);
  }
  msgLines.push(
    `*Total: ${ELEVEN.fmt(total)}*`,
    '─────────────────────',
    'Please confirm my order. Thank you!'
  );
  const msg = msgLines.join('\n');

  // Save full snapshot for confirmation page
  localStorage.setItem('eleven_order_id',       orderId);
  localStorage.setItem('eleven_order_snapshot', JSON.stringify(cart));
  localStorage.setItem('eleven_order_subtotal', subtotal);
  localStorage.setItem('eleven_order_discount', discount);
  localStorage.setItem('eleven_order_total_raw', total);
  localStorage.setItem('eleven_order_coupon',   code || '');
  ELEVEN.clearCart(); // also clears any applied discount/coupon

  const waNumber = '917560943996';
  window.open('https://wa.me/' + waNumber + '?text=' + encodeURIComponent(msg), '_blank');
  window.location.href = 'confirmation.html';
}

document.addEventListener('DOMContentLoaded', render);
</script>

</body>
</html>
